name: ZIP'ten APK Oluştur (Evrensel)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: JDK kur (17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: ZIP'i aç (repo içindeki ilk zip)
        run: |
          set -e
          mkdir -p src
          ZIP_FILE=$(ls -1 *.zip 2>/dev/null | head -n 1 || true)
          if [ -z "$ZIP_FILE" ]; then
            echo "Repo kökünde .zip bulunamadı!"
            echo "ZIP'i repo ana dizinine yüklediğine emin ol."
            exit 1
          fi
          echo "Bulunan ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d src
          echo "ZIP açıldı. İçerik:"
          find src -maxdepth 3 -type f -name "gradlew" -o -name "settings.gradle" -o -name "settings.gradle.kts" -print

      - name: Projeyi bul ve Debug APK üret
        run: |
          set -e
          # gradlew'i bul (en sağlam)
          GRADLEW_PATH=$(find src -type f -name gradlew | head -n 1 || true)

          # gradlew yoksa settings.gradle(.kts) üzerinden kökü bul
          if [ -z "$GRADLEW_PATH" ]; then
            SETTINGS_PATH=$(find src -maxdepth 6 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1 || true)
            if [ -z "$SETTINGS_PATH" ]; then
              echo "Android projesi bulunamadı (gradlew veya settings.gradle(.kts) yok)."
              exit 1
            fi
            PROJECT_DIR=$(dirname "$SETTINGS_PATH")
          else
            PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          fi

          echo "Proje klasörü: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

          # gradlew varsa onu kullan, yoksa sistem gradle denemek yerine hata verelim (daha net)
          if [ -f "$PROJECT_DIR/gradlew" ]; then
            chmod +x "$PROJECT_DIR/gradlew"
            cd "$PROJECT_DIR"
            ./gradlew --version
            ./gradlew assembleDebug --stacktrace
          else
            echo "gradlew bulunamadı: $PROJECT_DIR/gradlew"
            exit 1
          fi

      - name: APK yolunu bul
        run: |
          set -e
          APK_PATH=$(find src -type f -path "*/build/outputs/apk/debug/*.apk" | head -n 1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "Debug APK bulunamadı!"
            echo "Mevcut apk çıktıları:"
            find src -type f -path "*/build/outputs/apk/*/*.apk" -print || true
            exit 1
          fi
          echo "APK bulundu: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: APK'yi Artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.APK_PATH }}
